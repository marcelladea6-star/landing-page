<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pendaftaran Kelas Online</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f4f8;
        }

        .container {
            width: 400px;
            background: #ffffff;
            margin: 60px auto;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        textarea {
            resize: none;
            height: 70px;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            background: #4CAF50;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #43a047;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Pendaftaran Kelas Online</h2>

    <form>
        <label>Nama Lengkap</label>
        <input type="text" placeholder="Masukkan nama lengkap" required>

        <label>Email</label>
        <input type="email" placeholder="Masukkan email" required>

        <label>No. HP</label>
        <input type="tel" placeholder="08xxxxxxxxxx" required>

        <label>Pilih Kelas</label>
        <select required>
            <option value="">-- Pilih Kelas --</option>
            <option>Web Development</option>
            <option>Desain Grafis</option>
            <option>Data Science</option>
            <option>UI/UX Design</option>
        </select>

        <label>Alamat</label>
        <textarea placeholder="Masukkan alamat"></textarea>

        <button type="submit">Daftar Sekarang</button>
    </form>
</div>

</body>
</html>
